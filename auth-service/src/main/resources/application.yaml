server:
  port: ${SERVER_PORT:8001}

  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

  servlet:
    session:
      timeout: 1d
      cookie:
        name: SESSION
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax
        path: /

spring:
  application:
    name: auth-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/auth_service_db}
    username: ${DATABASE_USERNAME:auth_service_user}
    password: ${DATABASE_PASSWORD:auth_service_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:true}

    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      connect-timeout: 2s

  session:
    redis:
      namespace: pulsetrack:auth:sessions
      flush-mode: on-save

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "http://localhost:8001/login/oauth2/code/google"
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  authorization:
    bootstrap-super-admin-email: ${BOOTSTRAP_SUPER_ADMIN_EMAIL}

logging:
  level:
    root: INFO
    com.kavinda: DEBUG
    org.springframework.web: INFO
    org.springframework.security.oauth2: DEBUG

  file:
    name: ${LOG_FILE:logs/auth-service.log}